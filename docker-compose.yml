services:
  mysql:
    image: mysql:8.4
    container_name: resume-api-mysql
    restart: unless-stopped
    ports:
      - "${FORWARD_DB_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_DATABASE: "${DB_DATABASE:-resume_api}"
      MYSQL_USER: "${DB_USERNAME:-resume}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - resume-api-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_PASSWORD:-secret}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  resume-api-mysql:
    driver: local
